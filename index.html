/* ─────────── Storage & helpers ─────────── */
const storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      return v ? {
        value: v
      } : null;
    } catch (e) {
      return null;
    }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch (e) {}
  },
  async delete(key) {

/* ─────────── Share helper (uses Web Share API where available) ─────────── */
async function sharePDF(quote, totals, brandName, catalog) {
  const {
    blob,
    fileName
  } = await generatePDF(quote, totals, brandName, catalog, true);
  const file = new File([blob], fileName, {
    type: "application/pdf"
  });
  if (navigator.canShare && navigator.canShare({
    files: [file]
  })) {
    await navigator.share({
      files: [file],
      title: quote.jobName || "Quote",
      text: `${brandName || DEFAULT_BRAND} — ${quote.jobName || "Quote"}`
    });
    return "shared";
  }
  // Fallback: trigger a download
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  return "downloaded";
}
