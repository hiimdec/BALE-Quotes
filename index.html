    const money = (n) => {
      if (isNaN(n) || n === null) n = 0;
      return "£" + Number(n).toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const slug = (s) => (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 60) || "untitled";
    const itemId = (secKey, name) => `${secKey}-${slug(name)}`;
    const computeDaysFromRange = (start, end) => {
      if (!start || !end) return null;
      const s = new Date(start); const e = new Date(end);
      if (isNaN(s.getTime()) || isNaN(e.getTime()) || e < s) return null;
      return Math.max(1, Math.floor((e - s) / 86400000) + 1);
    };
    const dateFmt = (d) => {
      if (!d) return "";
      try { return new Date(d).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }); }
      catch { return d; }
    };

    /* ─────────── Catalog merging ───────────
       Overrides shape: {
         priceEdits: { "section:itemname": price },
         additions: [{section, name, price, default?}],
         removals: ["section:itemname", ...]
       }
    */
    function applyOverrides(base, overrides) {
      if (!overrides) return base;
      const live = {};
      for (const [secKey, sec] of Object.entries(base)) {
        const removed = new Set(overrides.removals || []);
        const items = sec.items
          .filter(it => !removed.has(`${secKey}:${it.name}`))
          .map(it => {
            const k = `${secKey}:${it.name}`;
            if (overrides.priceEdits && overrides.priceEdits[k] !== undefined) {
              return { ...it, price: overrides.priceEdits[k] };
            }
            return it;
          });
        live[secKey] = { ...sec, items };
      }
      // Apply additions
      (overrides.additions || []).forEach(add => {
        if (!live[add.section]) return;
        live[add.section].items.push({ name: add.name, price: add.price, default: add.default });
      });
      // Re-sort by price desc within each section
      Object.values(live).forEach(sec => {
        sec.items.sort((a, b) => Number(b.price) - Number(a.price));
      });
      return live;
    }

    /* ─────────── Quote model ─────────── */
    function buildItems(catalog, defaultsOn) {
      const items = {};
      Object.entries(catalog).forEach(([secKey, sec]) => {
        sec.items.forEach(item => {
          const id = itemId(secKey, item.name);
          items[id] = {
            section: secKey, name: item.name, price: item.price,
            days: 1, qty: defaultsOn ? (item.default || 0) : 0, custom: false,
          };
        });
      });
      return items;
    }

    const emptyQuote = (catalog, defaultsOn = true) => ({
      version: QUOTE_VERSION, jobName: "", jobDate: todayStr(),
      dateStart: "", dateEnd: "",
      productionCompany: "", producer: "",
      items: buildItems(catalog, defaultsOn),
      discountPct: 30,
      targetTotalOverride: null,
      deliveryPrice: 0, deliveryNote: "Delivery & Collect (London)",
      gafferDays: 1, gafferRate: 568, vanDays: 1, vanRate: 110,
      consumablesEstimate: 0, notes: "", defaultsOn,
    });

    function mergeSaved(catalog, saved) {
      const fresh = emptyQuote(catalog, saved?.defaultsOn ?? true);
      if (!saved) return fresh;
      const freshItems = { ...fresh.items };
      if (saved.items) {
        Object.values(saved.items).forEach(oldIt => {
          if (!oldIt || !oldIt.name) return;
          if (oldIt.custom) {
            const cid = `${oldIt.section}-custom-${slug(oldIt.name)}-${Math.random().toString(36).slice(2, 6)}`;
            freshItems[cid] = { ...oldIt };
            return;
          }
          const id = itemId(oldIt.section, oldIt.name);
          if (freshItems[id]) {
            freshItems[id] = { ...freshItems[id], qty: oldIt.qty, days: oldIt.days, price: oldIt.price ?? freshItems[id].price };
          } else {
            // Item was removed from catalog but is in this saved quote; keep it
            freshItems[id] = { ...oldIt };
          }
        });
      }
      return { ...fresh, ...saved, items: freshItems, version: QUOTE_VERSION };
    }

    /* ─────────── PDF generation ─────────── */
    async function generatePDF(quote, totals, brandName, catalog, returnBlob = false) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      const pageW = 210, pageH = 297;
      const mL = 15, mR = 15, mT = 15, mB = 15;
      const contentW = pageW - mL - mR;
      const COL_ITEM = mL;
      const COL_PRICE = pageW - mR - 55;
      const COL_DAYS = pageW - mR - 35;
      const COL_QTY = pageW - mR - 20;
      const COL_TOTAL = pageW - mR;

      const BLUE = [37, 99, 235], BLUE_DARK = [29, 78, 216];
      const DARK = [15, 23, 42], MID = [51, 65, 85];
      const MUTED = [100, 116, 139], LINE = [226, 232, 240];

      let y = mT;
      const setText = (size, weight = "normal", color = DARK) => {
        doc.setFontSize(size);
        doc.setFont("helvetica", weight);
        doc.setTextColor(color[0], color[1], color[2]);
      };
      const drawLine = (yy, color = LINE, width = 0.2) => {
        doc.setDrawColor(color[0], color[1], color[2]);
        doc.setLineWidth(width);
        doc.line(mL, yy, pageW - mR, yy);
      };
      const ensureSpace = (needed) => {
        if (y + needed > pageH - mB) { doc.addPage(); y = mT; return true; }
        return false;
      };

      doc.setFillColor(BLUE[0], BLUE[1], BLUE[2]);
      doc.circle(mL + 4, y + 4, 4, "F");
      setText(8, "bold", BLUE_DARK);
      doc.text((brandName || DEFAULT_BRAND).toUpperCase(), mL + 11, y + 5.5);
      y += 12;

      setText(22, "normal", DARK);
      doc.text(quote.jobName || "Quote", mL, y + 3);

      setText(7, "bold", MUTED);
      doc.text("QUOTE DATE", pageW - mR, y - 5, { align: "right" });
      setText(10, "bold", DARK);
      doc.text(dateFmt(quote.jobDate), pageW - mR, y, { align: "right" });

      y += 7;
      setText(9, "normal", MUTED);
      doc.text("Lighting Quotation", mL, y);
      y += 5;
      drawLine(y, DARK, 0.6);
      y += 6;

      setText(7, "bold", MUTED);
      doc.text("PRODUCTION", mL, y);
      doc.text("PRODUCER", mL + contentW / 2, y);
      y += 4;
      setText(10, "bold", DARK);
      doc.text(quote.productionCompany || "—", mL, y);
      doc.text(quote.producer || "—", mL + contentW / 2, y);
      y += 7;

      if (quote.dateStart) {
        let dateText = dateFmt(quote.dateStart);
        if (quote.dateEnd) {
          const days = computeDaysFromRange(quote.dateStart, quote.dateEnd);
          dateText = `${dateFmt(quote.dateStart)} → ${dateFmt(quote.dateEnd)}  ·  ${days} day${days !== 1 ? "s" : ""}`;
        }
        setText(7, "bold", MUTED);
        doc.text("SHOOT DATES", mL, y);
        y += 4;
        setText(10, "bold", DARK);
        doc.text(dateText, mL, y);
        y += 7;
      }

      y += 3;

      const drawSectionHeader = (label, noDiscount) => {
        ensureSpace(14);
        setText(10, "bold", DARK);
        doc.text(label.toUpperCase(), mL, y);
        if (noDiscount) {
          setText(7, "normal", MUTED);
          doc.text("NO DISCOUNT APPLIED", pageW - mR, y, { align: "right" });
        }
        y += 2;
        drawLine(y, [148, 163, 184], 0.4);
        y += 4;
        setText(7, "bold", MUTED);
        doc.text("ITEM", COL_ITEM, y);
        doc.text("PRICE", COL_PRICE, y, { align: "right" });
        doc.text("DAYS", COL_DAYS, y, { align: "center" });
        doc.text("QTY", COL_QTY, y, { align: "center" });
        doc.text("TOTAL", COL_TOTAL, y, { align: "right" });
        y += 3;
      };

      const drawRow = (name, price, days, qty, total) => {
        setText(9, "normal", DARK);
        const nameLines = doc.splitTextToSize(name, 95);
        const rowH = Math.max(5, nameLines.length * 4 + 1);
        if (y + rowH > pageH - mB) { doc.addPage(); y = mT; }
        nameLines.forEach((line, i) => doc.text(line, COL_ITEM, y + i * 4));
        const baseY = y;
        setText(9, "normal", MID);
        if (price !== null) doc.text(price, COL_PRICE, baseY, { align: "right" });
        if (days !== null) doc.text(String(days), COL_DAYS, baseY, { align: "center" });
        if (qty !== null) doc.text(String(qty), COL_QTY, baseY, { align: "center" });
        setText(9, "bold", DARK);
        doc.text(total, COL_TOTAL, baseY, { align: "right" });
        y += rowH + 0.5;
      };

      Object.entries(catalog).forEach(([secKey, sec]) => {
        const picked = Object.values(quote.items).filter(it => it.section === secKey && Number(it.qty) > 0);
        if (picked.length === 0) return;
        drawSectionHeader(sec.label, !!sec.excludeFromDiscount);
        picked.forEach(it => {
          const line = Number(it.price) * Number(it.days) * Number(it.qty);
          drawRow(it.name, money(it.price), it.days, it.qty, money(line));
        });
        y += 5;
      });

      const hasServices = totals.gaffer > 0 || totals.van > 0 || totals.delivery > 0 || totals.consumablesEst > 0;
      if (hasServices) {
        drawSectionHeader("Services & Transport", true);
        if (totals.gaffer > 0) drawRow("Gaffer day rate", money(quote.gafferRate), quote.gafferDays, null, money(totals.gaffer));
        if (totals.van > 0) drawRow("Van day rate", money(quote.vanRate), quote.vanDays, null, money(totals.van));
        if (totals.delivery > 0) drawRow(quote.deliveryNote || "Delivery", null, null, null, money(totals.delivery));
        if (totals.consumablesEst > 0) drawRow("Consumables estimate (charged as used)", null, null, null, money(totals.consumablesEst));
        y += 5;
      }

      ensureSpace(50);
      drawLine(y, DARK, 0.6);
      y += 6;
      const tLabelX = pageW - mR - 70, tValueX = pageW - mR;
      const totalRow = (label, value, opts = {}) => {
        const { bold = false, muted = false } = opts;
        ensureSpace(6);
        setText(9, bold ? "bold" : "normal", muted ? MUTED : DARK);
        doc.text(label, tLabelX, y);
        doc.text(money(value), tValueX, y, { align: "right" });
        y += 5;
      };
      totalRow("Kit subtotal", totals.discountable);
      if (totals.displayDiscountPct > 0) {
        totalRow(`Discount (${totals.displayDiscountPct}%)`, -totals.discountAmount, { muted: true });
        totalRow("Kit after discount", totals.kitAfterDiscount, { bold: true });
      }
      if (totals.services > 0) totalRow("Services & transport", totals.services);
      if ((totals.consumablesPicked + totals.consumablesEst) > 0) {
        totalRow("Consumables", totals.consumablesPicked + totals.consumablesEst);
      }

      y += 1;
      doc.setDrawColor(DARK[0], DARK[1], DARK[2]);
      doc.setLineWidth(0.6);
      doc.line(tLabelX - 5, y, tValueX, y);
      y += 6;
      setText(8, "bold", DARK);
      doc.text("TOTAL", tLabelX, y + 4);
      setText(20, "bold", BLUE_DARK);
      doc.text(money(totals.grandTotal), tValueX, y + 5, { align: "right" });
      y += 14;

      if (quote.notes && quote.notes.trim()) {
        ensureSpace(16);
        y += 3;
        drawLine(y, LINE, 0.3);
        y += 5;
        setText(7, "bold", MUTED);
        doc.text("NOTES", mL, y);
        y += 4;
        setText(9, "normal", MID);
        const lines = doc.splitTextToSize(quote.notes, contentW);
        lines.forEach(line => { ensureSpace(5); doc.text(line, mL, y); y += 4.5; });
      }

      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        setText(7, "normal", MUTED);
        doc.text("Cross hires available on request · Consumables charged as used", mL, pageH - 8);
        doc.text(brandName || DEFAULT_BRAND, pageW - mR, pageH - 8, { align: "right" });
        doc.text(`Page ${i} of ${pageCount}`, pageW / 2, pageH - 8, { align: "center" });
      }

      const safeName = slug(quote.jobName || "quote");
      const safeBrand = slug(brandName || "quote");
      const fileName = `${safeBrand}-${safeName}-${todayStr()}.pdf`;

      if (returnBlob) {
        const blob = doc.output("blob");
        return { blob, fileName };
      }
      doc.save(fileName);
      return { fileName };
    }

    /* ─────────── Share helper (uses Web Share API where available) ─────────── */
    async function sharePDF(quote, totals, brandName, catalog) {
      const { blob, fileName } = await generatePDF(quote, totals, brandName, catalog, true);
      const file = new File([blob], fileName, { type: "application/pdf" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: quote.jobName || "Quote",
          text: `${brandName || DEFAULT_BRAND} — ${quote.jobName || "Quote"}`,
        });
        return "shared";
      }
      // Fallback: trigger a download
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = fileName;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return "downloaded";
    }

    /* ─────────── Catalog editor ─────────── */
    function CatalogEditor({ overrides, onSave, onClose }) {
      const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(overrides || { priceEdits: {}, additions: [], removals: [] })));
      const [confirmReset, setConfirmReset] = useState(false);
      const [adding, setAdding] = useState(null); // section key
      const [newName, setNewName] = useState("");
      const [newPrice, setNewPrice] = useState("");

      const live = useMemo(() => applyOverrides(CATALOG_DEFAULT, draft), [draft]);

      const isRemoved = (secKey, name) => (draft.removals || []).includes(`${secKey}:${name}`);
      const isCustom = (secKey, name) => (draft.additions || []).some(a => a.section === secKey && a.name === name);

      const setPrice = (secKey, name, price) => {
        const k = `${secKey}:${name}`;
        if (isCustom(secKey, name)) {
          // Update the addition itself, not the priceEdits map
          setDraft(d => ({ ...d, additions: d.additions.map(a => a.section === secKey && a.name === name ? { ...a, price } : a) }));
        } else {
          setDraft(d => ({ ...d, priceEdits: { ...d.priceEdits, [k]: price } }));
        }
      };

      const removeItem = (secKey, name) => {
        if (isCustom(secKey, name)) {
          // Just drop the addition
          setDraft(d => ({ ...d, additions: d.additions.filter(a => !(a.section === secKey && a.name === name)) }));
        } else {
          const k = `${secKey}:${name}`;
          setDraft(d => ({ ...d, removals: [...(d.removals || []), k] }));
        }
      };

      const restoreItem = (secKey, name) => {
        const k = `${secKey}:${name}`;
        setDraft(d => ({ ...d, removals: (d.removals || []).filter(x => x !== k) }));
      };

      const resetPrice = (secKey, name) => {
        const k = `${secKey}:${name}`;
        setDraft(d => {
          const next = { ...d.priceEdits };
          delete next[k];
          return { ...d, priceEdits: next };
        });
      };

      const addItem = () => {
        const name = newName.trim();
        const price = parseFloat(newPrice);
        if (!name || isNaN(price) || price < 0 || !adding) return;
        // Check duplicates
        const exists = live[adding].items.some(it => it.name.toLowerCase() === name.toLowerCase());
        if (exists) { alert("An item with that name already exists in this section."); return; }
        setDraft(d => ({ ...d, additions: [...(d.additions || []), { section: adding, name, price }] }));
        setNewName(""); setNewPrice(""); setAdding(null);
      };

      const resetAll = () => {
        setDraft({ priceEdits: {}, additions: [], removals: [] });
        setConfirmReset(false);
      };

      const editCount = Object.keys(draft.priceEdits || {}).length;
      const addCount = (draft.additions || []).length;
      const removeCount = (draft.removals || []).length;
      const totalChanges = editCount + addCount + removeCount;

      return (
        <Modal title="Catalog editor" onClose={onClose} wide>
          <div className="space-y-4">
            <div className="flex items-center justify-between gap-3 text-sm">
              <div className="text-slate-500">
                {totalChanges === 0 ? "No changes from defaults." : (
                  <>
                    {editCount > 0 && <span>{editCount} price{editCount !== 1 ? "s" : ""} edited · </span>}
                    {addCount > 0 && <span>{addCount} added · </span>}
                    {removeCount > 0 && <span>{removeCount} removed</span>}
                  </>
                )}
              </div>
              {totalChanges > 0 && (
                <button onClick={() => setConfirmReset(true)} className="text-xs text-slate-500 hover:text-red-600 underline underline-offset-2">
                  Reset to defaults
                </button>
              )}
            </div>

            {Object.entries(CATALOG_DEFAULT).map(([secKey, sec]) => {
              const liveSec = live[secKey];
              const removedHere = (draft.removals || []).filter(k => k.startsWith(`${secKey}:`));
              return (
                <details key={secKey} className="bg-slate-50 rounded-lg overflow-hidden border border-slate-200/70" open={false}>
                  <summary className="px-4 py-3 cursor-pointer flex items-center justify-between hover:bg-slate-100/50 transition list-none">
                    <span className="font-semibold">{sec.label}</span>
                    <span className="text-xs text-slate-500 tabular-nums">{liveSec.items.length} item{liveSec.items.length !== 1 ? "s" : ""}</span>
                  </summary>
                  <div className="bg-white border-t border-slate-200/70">
                    {liveSec.items.map(it => {
                      const k = `${secKey}:${it.name}`;
                      const original = CATALOG_DEFAULT[secKey].items.find(x => x.name === it.name);
                      const edited = original && draft.priceEdits && draft.priceEdits[k] !== undefined && original.price !== draft.priceEdits[k];
                      const custom = isCustom(secKey, it.name);
                      return (
                        <div key={it.name} className="px-4 py-2.5 flex items-center gap-3 text-sm border-b border-slate-100 last:border-b-0">
                          <div className="flex-1 min-w-0">
                            <div className="font-medium truncate">{it.name}</div>
                            <div className="text-[10px] text-slate-400 mt-0.5">
                              {custom ? "Added" : edited ? `Default £${original.price.toFixed(2)}` : "Default"}
                            </div>
                          </div>
                          <div className="flex items-center gap-1">
                            <span className="text-slate-400 text-xs">£</span>
                            <input type="number" min="0" step="0.01" value={it.price}
                              onChange={e => setPrice(secKey, it.name, parseFloat(e.target.value) || 0)}
                              className="w-20 px-2 py-1.5 bg-slate-50 rounded text-right tabular-nums text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                              style={{ fontFamily: "'JetBrains Mono', monospace" }} />
                          </div>
                          {edited && !custom && (
                            <button onClick={() => resetPrice(secKey, it.name)}

                      );

                    {/* Show removed items so they can be restored */}
                    {removedHere.map(k => {
                      const name = k.split(":").slice(1).join(":");
                      const original = CATALOG_DEFAULT[secKey].items.find(x => x.name === name);

                      return (
                        <div key={k} className="px-4 py-2 flex items-center gap-3 text-sm border-b border-slate-100 last:border-b-0 bg-red-50/40">

                        </div>
                      );

                    {/* Add new */}
                    {adding === secKey ? (
                      <div className="px-4 py-3 flex items-center gap-2 bg-blue-50/40 border-t border-slate-100">
                        <input autoFocus value={newName} onChange={e => setNewName(e.target.value)} placeholder="Item name"

                        <span className="text-slate-400 text-xs">£</span>

                        <PlusIcon size={14} /> Add item to {sec.label}

            })}

            <p className="text-xs text-slate-500 leading-relaxed">
              Catalog edits apply to <em>new</em> items added to a quote. Items already added to an existing quote keep their per-quote price unless you re-add them.

    /* ─────────── Main app ─────────── */
    function QuoteGenerator() {
      // Catalog state
      const [catalogOverrides, setCatalogOverrides] = useState({ priceEdits: {}, additions: [], removals: [] });
      const liveCatalog = useMemo(() => applyOverrides(CATALOG_DEFAULT, catalogOverrides), [catalogOverrides]);

      // Core quote state
      const [quote, setQuote] = useState(() => emptyQuote(CATALOG_DEFAULT, true));
      const [brandName, setBrandName] = useState(DEFAULT_BRAND);
      const [mode, setMode] = useState("edit");
      const [openSections, setOpenSections] = useState({ lights: true });

      // Discount mode
      const [targetTotalInput, setTargetTotalInput] = useState("");
      const [discountEditMode, setDiscountEditMode] = useState("percent");

      // Saved quotes & recents
      const [savedList, setSavedList] = useState([]);
      const [recentIds, setRecentIds] = useState([]);
      const [savedSearch, setSavedSearch] = useState("");
      const [savedTab, setSavedTab] = useState("all"); // all | recent

      // Search across catalog
      const [itemSearch, setItemSearch] = useState("");

      // Modals & dialogs
      const [showSaveDialog, setShowSaveDialog] = useState(false);
      const [showLoadDialog, setShowLoadDialog] = useState(false);
      const [showSettingsDialog, setShowSettingsDialog] = useState(false);
      const [showCatalogEditor, setShowCatalogEditor] = useState(false);
      const [confirm, setConfirm] = useState(null); // { title, body, confirmLabel, danger, onConfirm }

      const [brandInput, setBrandInput] = useState("");
      const [saveName, setSaveName] = useState("");
      const [toast, setToast] = useState(null);
      const [globalDays, setGlobalDays] = useState(1);
      const [downloading, setDownloading] = useState(false);

      // For sticky section nav highlighting
      const sectionRefs = useRef({});
      const [activeSection, setActiveSection] = useState(null);

      const saveDebounce = useRef(null);

      /* Load everything on mount */
      useEffect(() => {
        (async () => {
          try {
            const r = await storage.get(CATALOG_OVERRIDES_KEY);
            if (r && r.value) setCatalogOverrides(JSON.parse(r.value));
          } catch (e) {}
          try {
            const r = await storage.get(STORAGE_KEY);
            if (r && r.value) setQuote(mergeSaved(CATALOG_DEFAULT, JSON.parse(r.value)));
          } catch (e) {}
          try {
            const r = await storage.get(SAVED_INDEX_KEY);
            if (r && r.value) setSavedList(JSON.parse(r.value));
          } catch (e) {}
          try {
            const r = await storage.get(RECENT_KEY);
            if (r && r.value) setRecentIds(JSON.parse(r.value));
          } catch (e) {}
          try {
            const r = await storage.get(BRAND_KEY);
            if (r && r.value) setBrandName(r.value);
          } catch (e) {}
        })();
      }, []);

      /* Auto-save current draft */
      useEffect(() => {
        if (saveDebounce.current) clearTimeout(saveDebounce.current);
        saveDebounce.current = setTimeout(async () => {
          try { await storage.set(STORAGE_KEY, JSON.stringify(quote)); } catch (e) {}
        }, 600);
        return () => clearTimeout(saveDebounce.current);
      }, [quote]);

      /* Auto-update globalDays from date range */
      useEffect(() => {
        const d = computeDaysFromRange(quote.dateStart, quote.dateEnd);
        if (d) setGlobalDays(d);
      }, [quote.dateStart, quote.dateEnd]);

      /* When catalog changes, ensure quote items still align — items removed
         from the catalog stay in the quote; new catalog items are added at qty 0. */
      useEffect(() => {
        setQuote(q => {
          const next = { ...q.items };
          Object.entries(liveCatalog).forEach(([secKey, sec]) => {
            sec.items.forEach(it => {
              const id = itemId(secKey, it.name);
              if (!next[id]) {
                next[id] = { section: secKey, name: it.name, price: it.price, days: 1, qty: 0, custom: false };
              }
            });
          });
          return { ...q, items: next };
        });
      }, [liveCatalog]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };
      const update = (patch) => setQuote(q => ({ ...q, ...patch }));
      const updateItem = (id, patch) => setQuote(q => ({ ...q, items: { ...q.items, [id]: { ...q.items[id], ...patch } } }));
      const deleteItem = (id) => setQuote(q => { const next = { ...q.items }; delete next[id]; return { ...q, items: next }; });
      const addCustomItem = (section) => {
        const id = `${section}-custom-${Date.now()}`;
        setQuote(q => ({ ...q, items: { ...q.items, [id]: { section, name: "New item", price: 0, days: globalDays || 1, qty: 1, custom: true } } }));
      };

      const applyGlobalDays = () => {
        const d = Math.max(0, Number(globalDays) || 0);
        setQuote(q => {
          const next = {};
          Object.entries(q.items).forEach(([id, it]) => { next[id] = { ...it, days: d }; });
          return { ...q, items: next, gafferDays: d, vanDays: d };
        });
        showToast(`Applied ${d} day${d !== 1 ? "s" : ""} to all`);
      };

      /* Defaults toggle — confirm if it would wipe non-zero items */
      const requestToggleDefaults = () => {
        if (quote.defaultsOn) {
          // turning OFF: warn if any items have qty > 0
          const nonZero = Object.values(quote.items).filter(it => Number(it.qty) > 0).length;
          if (nonZero > 0) {
            setConfirm({
              title: "Clear all items?",
              body: `Turning defaults off will reset all ${nonZero} item${nonZero !== 1 ? "s" : ""} to 0. Custom items you've added will be preserved at their current quantity.`,
              confirmLabel: "Clear",
              danger: true,
              onConfirm: () => { doToggleDefaults(); setConfirm(null); },
            });
            return;
          }
        }
        doToggleDefaults();
      };

      const doToggleDefaults = () => {
        const turningOn = !quote.defaultsOn;
        setQuote(q => {
          const next = {};
          Object.entries(q.items).forEach(([id, it]) => {
            if (it.custom) { next[id] = { ...it, qty: turningOn ? it.qty : it.qty }; return; }
            const catalogItem = liveCatalog[it.section]?.items.find(c => c.name === it.name);
            const defaultQty = catalogItem?.default || 0;
            next[id] = { ...it, qty: turningOn ? defaultQty : 0 };
          });
          return { ...q, items: next, defaultsOn: turningOn };
        });
        showToast(turningOn ? "Defaults loaded" : "Catalog items cleared");
      };

      /* Totals — same logic as before */
      const totals = useMemo(() => {
        let discountable = 0, consumablesPicked = 0;
        const sectionSubtotals = {};
        Object.values(quote.items).forEach(it => {
          const line = Number(it.price) * Number(it.days) * Number(it.qty);
          sectionSubtotals[it.section] = (sectionSubtotals[it.section] || 0) + line;
          if (liveCatalog[it.section]?.excludeFromDiscount) consumablesPicked += line;
          else discountable += line;
        });
        const gaffer = Number(quote.gafferRate) * Number(quote.gafferDays);
        const van = Number(quote.vanRate) * Number(quote.vanDays);
        const delivery = Number(quote.deliveryPrice) || 0;
        const consumablesEst = Number(quote.consumablesEstimate) || 0;
        const services = gaffer + van + delivery;
        const nonDiscountable = consumablesPicked + consumablesEst + services;

        let kitAfterDiscount, grandTotal, discountAmount, displayDiscountPct;
        if (quote.targetTotalOverride !== null && quote.targetTotalOverride !== undefined) {
          const target = Number(quote.targetTotalOverride);
          grandTotal = target;
          kitAfterDiscount = Math.max(0, target - nonDiscountable);
          discountAmount = Math.max(0, discountable - kitAfterDiscount);
          displayDiscountPct = discountable > 0 ? Math.round((discountAmount / discountable) * 100) : 0;
        } else {
          const pct = Math.max(0, Math.min(100, Number(quote.discountPct) || 0));
          kitAfterDiscount = discountable * (1 - pct / 100);
          discountAmount = discountable - kitAfterDiscount;
          grandTotal = kitAfterDiscount + nonDiscountable;
          displayDiscountPct = Math.round(pct);
        }

        return {
          discountable, kitAfterDiscount, discountAmount, displayDiscountPct,
          consumablesPicked, consumablesEst,
          gaffer, van, delivery, services, nonDiscountable, grandTotal,
          sectionSubtotals,
        };
      }, [quote, liveCatalog]);

      const applyTargetTotal = () => {
        const target = parseFloat(targetTotalInput);
        if (isNaN(target) || target < 0) return;
        update({ targetTotalOverride: target });
        showToast(`Total locked at ${money(target)}`);
      };

      const clearTargetOverride = () => {
        if (quote.targetTotalOverride === null || quote.targetTotalOverride === undefined) return;
        update({ targetTotalOverride: null, discountPct: totals.displayDiscountPct });
        showToast("Total override cleared");
      };

      const switchToPercentMode = () => {
        setDiscountEditMode("percent");
        if (quote.targetTotalOverride !== null && quote.targetTotalOverride !== undefined) {
          update({ targetTotalOverride: null, discountPct: totals.displayDiscountPct });
        }
      };

      const switchToTargetMode = () => {
        setDiscountEditMode("target");
        setTargetTotalInput(String(Math.round(totals.grandTotal)));
      };

      /* Recent quotes tracking */
      const pushRecent = async (id) => {
        const next = [id, ...recentIds.filter(x => x !== id)].slice(0, RECENT_MAX);
        setRecentIds(next);
        try { await storage.set(RECENT_KEY, JSON.stringify(next)); } catch (e) {}
      };

      /* Save / load / duplicate */
      const saveQuote = async () => {
        const name = (saveName || quote.jobName || "Untitled").trim();
        if (!name) return;
        const id = `${slug(name)}-${Date.now().toString(36)}`;
        try {
          await storage.set(SAVED_PREFIX + id, JSON.stringify(quote));
          const entry = { id, name, date: new Date().toISOString(), total: totals.grandTotal };
          const next = [entry, ...savedList].slice(0, 100);
          await storage.set(SAVED_INDEX_KEY, JSON.stringify(next));
          setSavedList(next);
          await pushRecent(id);
          setShowSaveDialog(false);
          setSaveName("");
          showToast(`Saved "${name}"`);
        } catch (e) { showToast("Save failed"); }
      };

      const loadSaved = async (id) => {
        try {
          const r = await storage.get(SAVED_PREFIX + id);
          if (r && r.value) {
            setQuote(mergeSaved(liveCatalog, JSON.parse(r.value)));
            setShowLoadDialog(false);
            await pushRecent(id);
            showToast("Loaded");
          }
        } catch (e) { showToast("Load failed"); }
      };

      const duplicateSaved = async (id) => {
        try {
          const r = await storage.get(SAVED_PREFIX + id);
          if (!r || !r.value) return;
          const original = JSON.parse(r.value);
          const dupName = `${original.jobName || "Quote"} (copy)`;
          const dupQuote = { ...original, jobName: dupName, jobDate: todayStr() };
          const newId = `${slug(dupName)}-${Date.now().toString(36)}`;
          await storage.set(SAVED_PREFIX + newId, JSON.stringify(dupQuote));
          const entry = { id: newId, name: dupName, date: new Date().toISOString(), total: original.total || 0 };
          const next = [entry, ...savedList].slice(0, 100);
          await storage.set(SAVED_INDEX_KEY, JSON.stringify(next));
          setSavedList(next);
          // Open the duplicate immediately
          setQuote(mergeSaved(liveCatalog, dupQuote));
          await pushRecent(newId);
          setShowLoadDialog(false);
          showToast(`Duplicated as "${dupName}"`);
        } catch (e) { showToast("Duplicate failed"); }
      };

      const deleteSaved = async (id, name) => {
        setConfirm({
          title: `Delete "${name}"?`,
          body: "This saved quote will be removed from this device. Can't be undone.",
          confirmLabel: "Delete",
          danger: true,
          onConfirm: async () => {
            try {
              await storage.delete(SAVED_PREFIX + id);
              const next = savedList.filter(s => s.id !== id);
              await storage.set(SAVED_INDEX_KEY, JSON.stringify(next));
              setSavedList(next);
              const nextRecent = recentIds.filter(x => x !== id);
              setRecentIds(nextRecent);
              try { await storage.set(RECENT_KEY, JSON.stringify(nextRecent)); } catch (e) {}
            } catch (e) {}
            setConfirm(null);
          },
        });
      };

      /* New quote — confirm if there's content */
      const newQuote = () => {
        const hasContent = quote.jobName || Object.values(quote.items).some(it => Number(it.qty) > 0 && !it.custom ? false : Number(it.qty) > 0);
        const dirty = quote.jobName || quote.productionCompany || quote.producer ||
          Object.values(quote.items).some(it => it.custom);
        if (dirty) {
          setConfirm({
            title: "Start a new quote?",
            body: "Any unsaved changes to the current quote will be lost. Saved quotes are not affected.",
            confirmLabel: "New quote",
            onConfirm: () => {
              setQuote(emptyQuote(liveCatalog, true)); setTargetTotalInput(""); setGlobalDays(1);
              setDiscountEditMode("percent");
              setItemSearch("");
              setConfirm(null);
              showToast("New quote started");
            },
          });
        } else {
          setQuote(emptyQuote(liveCatalog, true)); setTargetTotalInput(""); setGlobalDays(1);
          setDiscountEditMode("percent");
          setItemSearch("");
          showToast("New quote started");
        }
      };

      const handleDownloadPDF = async () => {
        if (downloading) return;
        setDownloading(true);
        showToast("Building PDF…");
        try {
          await generatePDF(quote, totals, brandName, liveCatalog);
          showToast("PDF downloaded");
        } catch (e) {
          console.error(e);
          showToast("PDF failed — check your connection");
        } finally { setDownloading(false); }
      };

      const handleSharePDF = async () => {
        if (downloading) return;
        setDownloading(true);
        showToast("Preparing PDF…");
        try {
          const result = await sharePDF(quote, totals, brandName, liveCatalog);
          showToast(result === "shared" ? "Shared" : "Downloaded");
        } catch (e) {
          if (e.name !== "AbortError") {
            console.error(e);
            showToast("Share failed");
          }
        } finally { setDownloading(false); }
      };

      const openSettings = () => {
        setBrandInput(brandName);
        setShowSettingsDialog(true);
      };

      const saveSettings = async () => {
        const name = (brandInput || "").trim() || DEFAULT_BRAND;
        setBrandName(name);
        try { await storage.set(BRAND_KEY, name); } catch (e) {}
        setShowSettingsDialog(false);
        showToast("Brand updated");
      };

      const saveCatalog = async (newOverrides) => {
        setCatalogOverrides(newOverrides);
        try { await storage.set(CATALOG_OVERRIDES_KEY, JSON.stringify(newOverrides)); } catch (e) {}
        setShowCatalogEditor(false);
        showToast("Catalog updated");
      };

      const sectionPicked = (secKey) => Object.values(quote.items).filter(it => it.section === secKey && Number(it.qty) > 0).length;
      const sectionSubtotal = (secKey) => totals.sectionSubtotals[secKey] || 0;

      /* Item search filter */
      const matchesSearch = (it) => {
        if (!itemSearch.trim()) return true;
        return it.name.toLowerCase().includes(itemSearch.toLowerCase());
      };
      const sectionHasMatches = (secKey) => {
        if (!itemSearch.trim()) return true;
        return Object.values(quote.items).some(it => it.section === secKey && matchesSearch(it));
      };
      const searchActive = !!itemSearch.trim();

      /* Sticky section nav: track which section is in view */
      useEffect(() => {
        if (mode !== "edit") return;
        const observer = new IntersectionObserver((entries) => {
          const visible = entries.filter(e => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible[0]) setActiveSection(visible[0].target.dataset.section);
        }, { rootMargin: "-100px 0px -50% 0px", threshold: 0 });
        Object.values(sectionRefs.current).forEach(el => el && observer.observe(el));
        return () => observer.disconnect();
      }, [mode, liveCatalog]);

      const scrollToSection = (secKey) => {
        const el = sectionRefs.current[secKey];
        if (!el) return;
        // Make sure it's open
        if (!openSections[secKey]) setOpenSections(o => ({ ...o, [secKey]: true }));
        // Allow render
        setTimeout(() => {
          const top = el.getBoundingClientRect().top + window.pageYOffset - 110;
          window.scrollTo({ top, behavior: "smooth" });
        }, 80);
      };

      /* Saved list filtered + tab */
      const filteredSavedList = useMemo(() => {
        const q = savedSearch.trim().toLowerCase();
        let list = savedList;
        if (savedTab === "recent") {
          const lookup = new Map(savedList.map(s => [s.id, s]));
          list = recentIds.map(id => lookup.get(id)).filter(Boolean);
        }
        if (q) list = list.filter(s => s.name.toLowerCase().includes(q));
        return list;
      }, [savedList, recentIds, savedSearch, savedTab]);

      /* Recent quotes for the in-app strip */
      const recentEntries = useMemo(() => {
        const lookup = new Map(savedList.map(s => [s.id, s]));
        return recentIds.map(id => lookup.get(id)).filter(Boolean).slice(0, 3);
      }, [savedList, recentIds]);

      if (mode === "preview") {
        return <PreviewView quote={quote} totals={totals} brandName={brandName} catalog={liveCatalog}
          onBack={() => setMode("edit")} onDownload={handleDownloadPDF} onShare={handleSharePDF} downloading={downloading} />;
      }

      const overrideActive = quote.targetTotalOverride !== null && quote.targetTotalOverride !== undefined;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          {/* Header */}
          <header className="sticky top-0 z-30 bg-slate-900 text-slate-50 safe-top">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
              <button onClick={openSettings} className="flex items-center gap-3 hover:opacity-80 transition text-left min-w-0">
                <div className="w-9 h-9 rounded-full bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/30 shrink-0">
                  <BulbIcon size={20} className="text-slate-50" />
                </div>
                <div className="leading-tight min-w-0">
                  <div className="text-[10px] uppercase tracking-[0.18em] text-blue-300 font-semibold truncate">{brandName}</div>
                  <div className="text-lg font-serif" style={{ fontFamily: "'Fraunces', serif", fontWeight: 450 }}>Quote Builder</div>
                </div>
              </button>
              <div className="flex items-center gap-2">
                <button onClick={openSettings} title="Settings"
                  className="h-10 w-10 rounded-lg bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition">
                  <SettingsIcon size={16} />
                </button>
                <button onClick={() => setShowLoadDialog(true)}
                  className="h-10 px-3 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm font-medium flex items-center gap-2 transition">
                  <FolderIcon size={16} /><span className="hidden sm:inline">Open</span>
                </button>
                <button onClick={() => { setSaveName(quote.jobName || ""); setShowSaveDialog(true); }}
                  className="h-10 px-3 rounded-lg bg-slate-800 hover:bg-slate-700 text-sm font-medium flex items-center gap-2 transition">
                  <SaveIcon size={16} /><span className="hidden sm:inline">Save</span>
                </button>
                <button onClick={() => setMode("preview")}
                  className="h-10 px-4 rounded-lg bg-blue-500 text-white hover:bg-blue-400 text-sm font-semibold flex items-center gap-2 transition">
                  <EyeIcon size={16} /><span>Preview</span>
                </button>
              </div>
            </div>

            {/* Recent quotes strip */}
            {recentEntries.length > 0 && (
              <div className="max-w-6xl mx-auto px-4 pb-3 flex items-center gap-2 overflow-x-auto no-scrollbar">
                <span className="text-[10px] uppercase tracking-[0.18em] text-slate-400 font-semibold shrink-0 flex items-center gap-1">
                  <ClockIcon size={11} /> Recent
                </span>
                {recentEntries.map(s => (
                  <button key={s.id} onClick={() => loadSaved(s.id)}
                    className="shrink-0 px-2.5 py-1 rounded-md bg-slate-800 hover:bg-slate-700 text-xs font-medium text-slate-200 truncate max-w-[180px]">
                    {s.name}
                  </button>
                ))}
              </div>
            )}

            {/* Section nav strip */}
            <div className="max-w-6xl mx-auto px-4 pb-2 flex items-center gap-1.5 overflow-x-auto no-scrollbar">
              {Object.entries(liveCatalog).map(([secKey, sec]) => {
                const picked = sectionPicked(secKey);
                const isActive = activeSection === secKey;
                return (
                  <button key={secKey} onClick={() => scrollToSection(secKey)}
                    className={`shrink-0 px-2.5 py-1 rounded-md text-xs font-medium transition whitespace-nowrap ${
                      isActive ? "bg-blue-500 text-white" : "bg-slate-800 hover:bg-slate-700 text-slate-300"
                    }`}>
                    {sec.label}
                    {picked > 0 && <span className="ml-1.5 tabular-nums opacity-70">{picked}</span>}
                  </button>
                );
              })}
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 pb-56 pt-6 space-y-6">

            {/* Job details */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden">
              <div className="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
                <h2 className="text-xs uppercase tracking-[0.18em] text-slate-500 font-semibold">Job Details</h2>
                <button onClick={newQuote} className="text-xs text-slate-500 hover:text-slate-900 flex items-center gap-1">
                  <RotateIcon size={12} /> New
                </button>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 p-5">
                <Field label="Job name" value={quote.jobName} onChange={v => update({ jobName: v })} placeholder="Dove Commercial" />
                <Field label="Quote date" type="date" value={quote.jobDate} onChange={v => update({ jobDate: v })} />
                <Field label="Production company" value={quote.productionCompany} onChange={v => update({ productionCompany: v })} placeholder="Merman London" />
                <Field label="Producer" value={quote.producer} onChange={v => update({ producer: v })} placeholder="Producer name" />
              </div>
            </section>

            {/* Schedule + Defaults */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden">
              <div className="px-5 py-3 border-b border-slate-100 flex items-center gap-2">
                <CalendarIcon size={16} className="text-slate-400" />
                <h2 className="text-xs uppercase tracking-[0.18em] text-slate-500 font-semibold">Schedule & Defaults</h2>
              </div>
              <div className="p-5 space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 items-end">
                  <Field label="Shoot start" type="date" value={quote.dateStart} onChange={v => update({ dateStart: v })} />
                  <Field label="Shoot end" type="date" value={quote.dateEnd} onChange={v => update({ dateEnd: v })} />
                  <div>
                    <div className="text-[10px] uppercase tracking-[0.18em] text-slate-500 font-semibold mb-1.5">Days</div>
                    <div className="flex items-center bg-slate-100 rounded-lg overflow-hidden">
                      <button onClick={() => setGlobalDays(d => Math.max(0, Number(d) - 1))}
                        className="w-10 h-11 flex items-center justify-center hover:bg-slate-200"><MinusIcon size={16} /></button>
                      <input type="number" min="0" value={globalDays}
                        onChange={e => setGlobalDays(Math.max(0, parseInt(e.target.value) || 0))}
                        className="flex-1 h-11 text-center bg-transparent tabular-nums font-semibold focus:outline-none"
                        style={{ fontFamily: "'JetBrains Mono', monospace" }} />
                      <button onClick={() => setGlobalDays(d => Number(d) + 1)}
                        className="w-10 h-11 flex items-center justify-center hover:bg-slate-200"><PlusIcon size={16} /></button>
                    </div>
                  </div>
                </div>
                <button onClick={applyGlobalDays}
                  className="w-full sm:w-auto px-4 py-2.5 bg-slate-900 text-white rounded-lg text-sm font-semibold hover:bg-slate-800 transition flex items-center gap-2 justify-center">
                  <CheckIcon size={16} /> Apply {globalDays} day{globalDays !== 1 ? "s" : ""} to all items
                </button>

                <div className="border-t border-slate-100 pt-5 flex items-start justify-between gap-4">
                  <div className="flex-1">
                    <div className="text-sm font-semibold mb-0.5">Default kit</div>
                    <div className="text-xs text-slate-500">
                      Pre-loads our standard kit (floppies, c-stands, cardellinis, grid cloth, and so on). Turn off to start from zero.
                    </div>
                  </div>
                  <button onClick={requestToggleDefaults} role="switch" aria-checked={quote.defaultsOn}
                    className={`relative w-14 h-8 rounded-full transition-colors shrink-0 ${quote.defaultsOn ? "bg-blue-500" : "bg-slate-300"}`}>
                    <span className={`absolute top-1 left-1 w-6 h-6 bg-white rounded-full shadow transition-transform ${quote.defaultsOn ? "translate-x-6" : "translate-x-0"}`} />
                  </button>
                </div>
              </div>
            </section>

            {/* Item search */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden">
              <div className="p-3">
                <div className="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2.5">
                  <SearchIcon size={16} className="text-slate-400 shrink-0" />
                  <input value={itemSearch} onChange={e => setItemSearch(e.target.value)}
                    placeholder="Search items across all sections — e.g. skypanel, cardellini…"
                    className="flex-1 bg-transparent text-sm focus:outline-none" />
                  {itemSearch && (
                    <button onClick={() => setItemSearch("")} className="p-1 rounded hover:bg-slate-200">
                      <XIcon size={14} className="text-slate-400" />
                    </button>
                  )}
                </div>
                {searchActive && (
                  <div className="text-xs text-slate-500 mt-2 px-1">
                    Showing items matching "<span className="font-medium text-slate-700">{itemSearch}</span>". Sections without matches are hidden.
                  </div>
                )}
              </div>
            </section>

            {/* Catalog sections */}
            {Object.entries(liveCatalog).map(([secKey, sec]) => {
              const isOpen = !!openSections[secKey] || searchActive;
              const picked = sectionPicked(secKey);
              const sub = sectionSubtotal(secKey);
              const isConsumable = !!sec.excludeFromDiscount;
              const sectionItems = Object.entries(quote.items).filter(([_, it]) => it.section === secKey);
              if (searchActive && !sectionHasMatches(secKey)) return null;
              const visibleItems = searchActive ? sectionItems.filter(([_, it]) => matchesSearch(it)) : sectionItems;

              return (
                <section key={secKey}
                  ref={el => { sectionRefs.current[secKey] = el; }}
                  data-section={secKey}
                  className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden scroll-mt-32">
                  <button onClick={() => !searchActive && setOpenSections(o => ({ ...o, [secKey]: !isOpen }))}
                    disabled={searchActive}
                    className="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition text-left disabled:cursor-default disabled:hover:bg-transparent">
                    <div className="flex items-center gap-3">
                      {!searchActive && (isOpen ? <ChevDownIcon size={20} className="text-slate-400" /> : <ChevRightIcon size={20} className="text-slate-400" />)}
                      <h3 className="text-lg font-serif" style={{ fontFamily: "'Fraunces', serif" }}>{sec.label}</h3>
                      {isConsumable && (<span className="text-[9px] uppercase tracking-widest font-bold bg-slate-900 text-blue-300 px-2 py-0.5 rounded">No discount</span>)}
                    </div>
                    <div className="flex items-center gap-4 text-sm">
                      {picked > 0 && <span className="text-slate-500 tabular-nums">{picked} item{picked !== 1 ? "s" : ""}</span>}
                      {sub > 0 && <span className="font-semibold tabular-nums" style={{ fontFamily: "'JetBrains Mono', monospace" }}>{money(sub)}</span>}
                    </div>
                  </button>
                  {isOpen && (
                    <div className="border-t border-slate-100">
                      {visibleItems.map(([id, it]) => (
                        <ItemRow key={id} id={id} item={it} onChange={patch => updateItem(id, patch)}
                          onDelete={it.custom ? () => deleteItem(id) : null}
                          highlight={searchActive && matchesSearch(it)} />
                      ))}
                      {!searchActive && (
                        <div className="px-4 py-3 border-t border-slate-100">
                          <button onClick={() => addCustomItem(secKey)}
                            className="text-sm text-blue-700 hover:text-blue-800 font-medium flex items-center gap-1">
                            <PlusIcon size={16} /> Add custom item
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </section>
              );
            })}

            {/* Services & Transport */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden">
              <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-3">
                <h3 className="text-lg font-serif" style={{ fontFamily: "'Fraunces', serif" }}>Services & Transport</h3>
                <span className="text-[9px] uppercase tracking-widest font-bold bg-slate-900 text-blue-300 px-2 py-0.5 rounded">No discount</span>
              </div>
              <div className="divide-y divide-slate-100">
                <ServiceRow name="Gaffer day rate" price={quote.gafferRate} days={quote.gafferDays}
                  onPrice={v => update({ gafferRate: v })} onDays={v => update({ gafferDays: v })} />
                <ServiceRow name="Van day rate" price={quote.vanRate} days={quote.vanDays}
                  onPrice={v => update({ vanRate: v })} onDays={v => update({ vanDays: v })} />
                <div className="px-4 py-3 grid grid-cols-12 gap-3 items-center">
                  <div className="col-span-12 sm:col-span-6">
                    <input className="w-full text-sm font-medium bg-transparent focus:outline-none focus:bg-slate-50 rounded px-2 py-1.5 -mx-2"
                      value={quote.deliveryNote} onChange={e => update({ deliveryNote: e.target.value })} placeholder="Delivery note" />
                    <div className="text-[11px] text-slate-400 mt-0.5">Usually £0 — set an amount if charging</div>
                  </div>
                  <div className="col-span-12 sm:col-span-6 flex justify-end">
                    <div className="flex items-center gap-2">
                      <span className="text-slate-400 text-sm">£</span>
                      <input type="number" min="0" step="0.01"
                        className="w-28 text-right px-3 py-2 bg-slate-100 rounded-lg tabular-nums text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-400"
                        style={{ fontFamily: "'JetBrains Mono', monospace" }} value={quote.deliveryPrice}
                        onChange={e => update({ deliveryPrice: parseFloat(e.target.value) || 0 })} />
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* Consumables estimate */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden">
              <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-3">
                <h3 className="text-lg font-serif" style={{ fontFamily: "'Fraunces', serif" }}>Consumables Estimate</h3>
                <span className="text-[9px] uppercase tracking-widest font-bold bg-slate-900 text-blue-300 px-2 py-0.5 rounded">No discount</span>
              </div>
              <div className="p-5">
                <p className="text-sm text-slate-500 mb-3">Lump-sum estimate for gels, tape, wrap, and anything not ticked above. Charged as used.</p>
                <div className="flex items-center gap-2">
                  <span className="text-slate-400 text-sm">£</span>
                  <input type="number" min="0" step="1"
                    className="w-36 text-right px-3 py-2 bg-slate-100 rounded-lg tabular-nums text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-400"
                    style={{ fontFamily: "'JetBrains Mono', monospace" }} value={quote.consumablesEstimate}
                    onChange={e => update({ consumablesEstimate: parseFloat(e.target.value) || 0 })} />
                </div>
              </div>
            </section>

            {/* Notes */}
            <section className="bg-white rounded-2xl shadow-sm border border-slate-200/70 overflow-hidden">
              <div className="px-5 py-4 border-b border-slate-100">
                <h3 className="text-lg font-serif" style={{ fontFamily: "'Fraunces', serif" }}>Notes</h3>
              </div>
              <div className="p-5">
                <textarea className="w-full text-sm bg-slate-50 rounded-lg px-3 py-2 min-h-24 focus:outline-none focus:ring-2 focus:ring-blue-400"
                  placeholder="Any notes for the client — cross hires, extras on request, etc."
                  value={quote.notes} onChange={e => update({ notes: e.target.value })} />
              </div>
            </section>
          </main>

          {/* Sticky bottom bar */}
          <div className="fixed bottom-0 inset-x-0 bg-slate-900 text-slate-50 shadow-2xl z-30 safe-bottom">
            <div className="max-w-6xl mx-auto px-4 py-4">
              <div className="grid grid-cols-12 gap-4 items-end">
                <div className="col-span-12 md:col-span-7">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-semibold">
                      {overrideActive ? "Total locked" : "Discount"}
                    </span>
                    <div className="flex bg-slate-800 rounded-md overflow-hidden text-[11px]">
                      <button onClick={switchToPercentMode}
                        className={`px-2 py-0.5 ${discountEditMode === "percent" && !overrideActive ? "bg-blue-500 text-white font-semibold" : "text-slate-400"}`}>By %</button>
                      <button onClick={switchToTargetMode}
                        className={`px-2 py-0.5 ${discountEditMode === "target" || overrideActive ? "bg-blue-500 text-white font-semibold" : "text-slate-400"}`}>By total</button>
                    </div>
                    {overrideActive && (
                      <button onClick={clearTargetOverride}
                        className="text-[11px] text-slate-400 hover:text-blue-300 underline underline-offset-2">unlock</button>
                    )}
                  </div>
                  {discountEditMode === "percent" && !overrideActive ? (
                    <div className="flex items-center gap-3">
                      <input type="range" min="0" max="100" step="1" value={quote.discountPct}
                        onChange={e => update({ discountPct: parseInt(e.target.value) || 0 })}
                        className="flex-1 accent-blue-500" />
                      <div className="flex items-center gap-1 bg-slate-800 rounded-lg px-2">
                        <input type="number" min="0" max="100" step="1" value={quote.discountPct}
                          onChange={e => update({ discountPct: Math.max(0, Math.min(100, parseInt(e.target.value) || 0)) })}
                          className="w-14 py-2 bg-transparent text-right tabular-nums focus:outline-none"
                          style={{ fontFamily: "'JetBrains Mono', monospace" }} />
                        <span className="text-slate-400">%</span>
                      </div>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2">
                      <span className="text-slate-400">£</span>
                      <input type="number" min="0" step="1" value={targetTotalInput}
                        onChange={e => setTargetTotalInput(e.target.value)}
                        onKeyDown={e => e.key === "Enter" && applyTargetTotal()}
                        placeholder="Target total"
                        className="flex-1 py-2 px-3 bg-slate-800 rounded-lg tabular-nums focus:outline-none focus:ring-2 focus:ring-blue-400"
                        style={{ fontFamily: "'JetBrains Mono', monospace" }} />
                      <button onClick={applyTargetTotal}
                        className="py-2 px-4 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-400">Apply</button>
                    </div>
                  )}

                  {/* Section breakdown — collapsible */}
                  <details className="mt-2 group">
                    <summary className="cursor-pointer text-[11px] text-slate-400 hover:text-slate-200 inline-flex items-center gap-1 select-none">
                      <ChevRightIcon size={11} className="transition-transform group-open:rotate-90" />
                      Breakdown
                    </summary>
                    <div className="mt-2 grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-1 text-[11px] text-slate-400 tabular-nums" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
                      {Object.entries(liveCatalog).map(([secKey, sec]) => {
                        const sub = totals.sectionSubtotals[secKey] || 0;
                        if (sub === 0) return null;
                        return (
                          <div key={secKey} className="flex justify-between gap-2">
                            <span className="truncate">{sec.label}</span>
                            <span className="text-slate-300">{money(sub)}</span>
                          </div>
                        );
                      })}
                      <div className="flex justify-between gap-2">
                        <span>Gaffer</span><span className="text-slate-300">{money(totals.gaffer)}</span>
                      </div>
                      <div className="flex justify-between gap-2">
                        <span>Van</span><span className="text-slate-300">{money(totals.van)}</span>
                      </div>
                      {totals.delivery > 0 && (
                        <div className="flex justify-between gap-2">
                          <span>Delivery</span><span className="text-slate-300">{money(totals.delivery)}</span>
                        </div>
                      )}
                      {totals.consumablesEst > 0 && (
                        <div className="flex justify-between gap-2">
                          <span>Consumables est.</span><span className="text-slate-300">{money(totals.consumablesEst)}</span>
                        </div>
                      )}
                      <div className="col-span-2 sm:col-span-3 border-t border-slate-700 pt-1 mt-1 flex justify-between">
                        <span>Discount ({totals.displayDiscountPct}%)</span>
                        <span className="text-slate-300">−{money(totals.discountAmount)}</span>
                      </div>
                    </div>
                  </details>
                </div>
                <div className="col-span-12 md:col-span-5 flex items-center justify-between md:justify-end gap-3">
                  <div className="text-right">
                    <div className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-semibold">
                      {overrideActive ? "Total (locked)" : "Total"}
                    </div>
                    <div className="text-3xl font-serif text-blue-300 tabular-nums leading-tight" style={{ fontFamily: "'Fraunces', serif" }}>
                      {money(totals.grandTotal)}
                    </div>
                  </div>
                  <button onClick={() => setMode("preview")}
                    className="h-12 px-5 rounded-lg bg-blue-500 text-white font-semibold flex items-center gap-2 hover:bg-blue-400 transition">
                    <EyeIcon size={16} /> Preview
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* Save dialog */}
          {showSaveDialog && (
            <Modal onClose={() => setShowSaveDialog(false)} title="Save this quote">
              <p className="text-sm text-slate-500 mb-3">Saves to this device only. You can load it again anytime.</p>
              <input autoFocus value={saveName} onChange={e => setSaveName(e.target.value)} placeholder="Quote name"
                className="w-full px-3 py-3 bg-slate-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                onKeyDown={e => e.key === "Enter" && saveQuote()} />
              <div className="flex justify-end gap-2 mt-4">
                <button onClick={() => setShowSaveDialog(false)} className="px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">Cancel</button>
                <button onClick={saveQuote} className="px-4 py-2 rounded-lg bg-slate-900 text-white font-semibold hover:bg-slate-800">Save</button>
              </div>
            </Modal>
          )}

          {/* Load dialog with tabs + search + duplicate */}
          {showLoadDialog && (
            <Modal onClose={() => setShowLoadDialog(false)} title="Saved quotes">
              <div className="space-y-3">
                <div className="flex bg-slate-100 rounded-lg p-1 text-sm">
                  <button onClick={() => setSavedTab("all")}
                    className={`flex-1 py-1.5 rounded-md font-medium ${savedTab === "all" ? "bg-white shadow-sm text-slate-900" : "text-slate-500"}`}>
                    <ListIcon size={14} className="inline mr-1.5" />All
                  </button>
                  <button onClick={() => setSavedTab("recent")}
                    className={`flex-1 py-1.5 rounded-md font-medium ${savedTab === "recent" ? "bg-white shadow-sm text-slate-900" : "text-slate-500"}`}>
                    <ClockIcon size={14} className="inline mr-1.5" />Recent
                  </button>
                </div>
                <div className="flex items-center gap-2 bg-slate-100 rounded-lg px-3 py-2">
                  <SearchIcon size={14} className="text-slate-400" />
                  <input value={savedSearch} onChange={e => setSavedSearch(e.target.value)}
                    placeholder="Search saved quotes…"
                    className="flex-1 bg-transparent text-sm focus:outline-none" />
                  {savedSearch && (
                    <button onClick={() => setSavedSearch("")} className="p-0.5 rounded hover:bg-slate-200">
                      <XIcon size={12} className="text-slate-400" />
                    </button>
                  )}
                </div>
              </div>

              {filteredSavedList.length === 0 ? (
                <p className="text-sm text-slate-500 py-6 text-center">
                  {savedSearch ? "No matches." : (savedTab === "recent" ? "No recent quotes yet." : "No saved quotes yet.")}
                </p>
              ) : (
                <div className="divide-y divide-slate-100 max-h-96 overflow-auto -mx-2 mt-3">
                  {filteredSavedList.map(s => (
                    <div key={s.id} className="flex items-center justify-between gap-2 px-2 py-3">
                      <button onClick={() => loadSaved(s.id)} className="text-left flex-1 min-w-0">
                        <div className="font-semibold truncate">{s.name}</div>
                        <div className="text-xs text-slate-500 tabular-nums">
                          {new Date(s.date).toLocaleString("en-GB", { dateStyle: "medium", timeStyle: "short" })}{" · "}{money(s.total)}
                        </div>
                      </button>
                      <button onClick={() => duplicateSaved(s.id)} title="Duplicate"
                        className="p-2 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50">
                        <CopyIcon size={16} />
                      </button>
                      <button onClick={() => deleteSaved(s.id, s.name)} title="Delete"
                        className="p-2 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50">
                        <TrashIcon size={16} />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </Modal>
          )}

          {/* Settings */}
          {showSettingsDialog && (
            <Modal onClose={() => setShowSettingsDialog(false)} title="Settings">
              <div className="space-y-5">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.18em] text-slate-500 font-semibold mb-1.5">Brand name</div>
                  <input autoFocus value={brandInput} onChange={e => setBrandInput(e.target.value)}
                    placeholder={DEFAULT_BRAND}
                    className="w-full px-3 py-3 bg-slate-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    onKeyDown={e => e.key === "Enter" && saveSettings()} />
                  <p className="text-xs text-slate-500 mt-2">
                    Appears in the header, on the PDF export, and in the file name. Saved on this device.
                  </p>
                </div>

                <div className="border-t border-slate-100 pt-5">
                  <button onClick={() => { setShowSettingsDialog(false); setShowCatalogEditor(true); }}
                    className="w-full text-left px-4 py-3 bg-slate-50 hover:bg-slate-100 rounded-lg transition flex items-center justify-between">
                    <div>
                      <div className="font-semibold text-sm">Catalog editor</div>
                      <div className="text-xs text-slate-500">Edit master prices, add or remove items.</div>
                    </div>
                    <ChevRightIcon size={16} className="text-slate-400" />
                  </button>
                </div>
              </div>
              <div className="flex justify-end gap-2 mt-5">
                <button onClick={() => setShowSettingsDialog(false)} className="px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-100">Cancel</button>
                <button onClick={saveSettings} className="px-4 py-2 rounded-lg bg-slate-900 text-white font-semibold hover:bg-slate-800">Save</button>
              </div>
            </Modal>
          )}

          {/* Catalog editor */}
          {showCatalogEditor && (
            <CatalogEditor overrides={catalogOverrides}
              onSave={saveCatalog}
              onClose={() => setShowCatalogEditor(false)} />
          )}

          {/* Confirmation dialog */}
          {confirm && (
            <ConfirmDialog
              title={confirm.title}
              body={confirm.body}
              confirmLabel={confirm.confirmLabel}
              danger={confirm.danger}
              onConfirm={confirm.onConfirm}
              onCancel={() => setConfirm(null)}
            />
          )}

          {/* Toast */}
          {toast && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-900 text-blue-300 px-4 py-2 rounded-full text-sm font-medium shadow-xl z-50">
              {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<QuoteGenerator />);
  </script>
</body>
</html>
